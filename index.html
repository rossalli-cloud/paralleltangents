<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e1610">
  <title>Tape Deck · UTC Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1610;
      --bg-deep:   #0e0b07;
      --bg-mid:    #140f08;
      --border:    #3a2e1e;
      --border-dim:#2a1e0e;
      --gold:      #f0c84a;
      --gold-lt:   #ffe066;
      --gold-dk:   #c8960a;
      --text:      #d4c4a0;
      --text-dim:  #8a7355;
      --text-muted:#4a3820;
      --text-dark: #6a5030;
      --green:     #6abf69;
    }

    html, body {
      min-height: 100%;
      background: linear-gradient(160deg, #1a1200 0%, #0a0a0a 50%, #0d0a1a 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px 48px;
      font-family: 'IBM Plex Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      background: linear-gradient(180deg, #3a2800 0%, #1a1000 60%, #0e0b07 100%);
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 420px;
      color: var(--text);
      border: 1.5px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .shell::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,200,74,0.06) 3px, rgba(240,200,74,0.06) 4px);
      pointer-events: none;
      border-radius: 20px;
    }

    .deck-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin-bottom: 20px;
      white-space: nowrap;
    }

    .tape-window {
      background: var(--bg-deep);
      border-radius: 14px;
      border: 2px solid var(--gold);
      padding: 18px 16px 14px;
      margin-bottom: 16px;
      position: relative;
    }
    .tape-window::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 12px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
      pointer-events: none;
    }

    .reels-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 14px;
    }

    .reel-wrap { position: relative; width: 88px; height: 88px; display: flex; align-items: center; justify-content: center; }
    .reel {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: radial-gradient(circle at 50% 50%, #2a1f0e 0%, #1a1208 60%, #0e0b07 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .reel.spinning      { animation: reelSpin 1.8s linear infinite; }
    .reel.spinning-slow { animation: reelSpin 3.5s linear infinite; }
    @keyframes reelSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .reel svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .reel-hub {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #3a2c18;
      border: 1.5px solid var(--gold);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .track-label {
      background: var(--gold);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .label-title {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      color: #1a1000;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
    .label-sub {
      font-size: 9px;
      color: #5a3800;
      letter-spacing: 0.2em;
      margin-top: 3px;
    }

    .tape-path {
      height: 6px;
      background: var(--bg-mid);
      border-radius: 3px;
      margin: 0 8px 12px;
      overflow: hidden;
    }
    .tape-sheen {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, rgba(200,168,75,0.15), transparent);
      animation: tapeMove 2s linear infinite;
      animation-play-state: paused;
    }
    .tape-sheen.playing { animation-play-state: running; }
    @keyframes tapeMove { from { transform: translateX(-100%); } to { transform: translateX(400%); } }

    .vu-row {
      display: flex;
      gap: 3px;
      justify-content: center;
      align-items: flex-end;
      height: 32px;
    }
    .vu-bar {
      width: 5px;
      border-radius: 2px;
      background: var(--gold-dk);
      opacity: 0.2;
      height: 4px;
    }


      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 10px;
      color: var(--gold);
      padding-top: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
    }
    .ctrl-btn { display: none; }

    .play-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--gold-dk);
      border: none;
      color: #1a1000;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin: 0 auto;
    }
    .play-btn:hover  { background: var(--gold); }
    .play-btn:active { transform: scale(0.95); }
    .play-btn.ready  { background: var(--gold); box-shadow: 0 0 0 4px rgba(200,168,75,0.25); }

    .share-section {
      border-top: 1px solid var(--border-dim);
      padding-top: 14px;
    }
    .share-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .share-row { display: flex; gap: 8px; }
    .sync-msg {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border-dim);
      border-radius: 6px;
      color: var(--gold);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 12px;
      text-align: center;
      line-height: 1.6;
    }
    }
    .copy-btn {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--border); }

    .status-row {
      margin-top: 10px;
      font-size: 10px;
      color: var(--text-dark);
      min-height: 14px;
      letter-spacing: 0.04em;
      text-align: center;
    }
    .status-row.ok { color: var(--green); }

    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(200,168,75,0.95);
      color: #1a1000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="shell">
  <div class="deck-title">Parallel Tangents &middot; UTC Sync</div>

  <div class="tape-window">
    <div class="reels-row">
      <div class="reel-wrap">
        <div class="reel" id="reelL">
          <svg viewBox="0 0 82 82"><g stroke="var(--gold)" stroke-width="1.5" fill="none">
            <circle cx="41" cy="41" r="32"/>
            <circle cx="41" cy="41" r="24"/>
            <circle cx="41" cy="41" r="16"/>
            <circle cx="41" cy="41" r="8"/>
          </g></svg>
          <div class="reel-hub"></div>
        </div>
      </div>

      <div style="text-align:center;flex:1;padding:0 10px;">
        <div class="track-label">
          <div class="label-sub" id="trackSub">A &middot; SIDE</div>
        </div>
      </div>
      <div class="reel-wrap">
        <div class="reel" id="reelR">
          <svg viewBox="0 0 82 82"><g stroke="var(--gold)" stroke-width="1.5" fill="none">
            <circle cx="41" cy="41" r="32"/>
            <circle cx="41" cy="41" r="24"/>
            <circle cx="41" cy="41" r="16"/>
            <circle cx="41" cy="41" r="8"/>
          </g></svg>
          <div class="reel-hub"></div>
        </div>
      </div>
    </div>
    <div class="tape-path"><div class="tape-sheen" id="tapeSheen"></div></div>
    <div class="vu-row" id="vuRow"></div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">—</span>
    </div>
  </div>

  <div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <svg id="playIcon"  width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>

  <div class="share-section">
    <div class="share-row">
      <div class="sync-msg">wait for all to sync<br>before pressing play</div>
    </div>
    <div class="status-row" id="statusRow"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let audio     = null;
let isPlaying = false;
let syncEpoch = null;
let syncTimer = null;
let vuTimer   = null;

function getUTC() { return Date.now() / 1000; }

function fmt(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setStatus(msg, ok = false) {
  const s = document.getElementById('statusRow');
  s.textContent = msg;
  s.className = 'status-row' + (ok ? ' ok' : '');
}

// Build VU bars
(function() {
  const row = document.getElementById('vuRow');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'vu-bar'; b.id = 'vu' + i;
    row.appendChild(b);
  }
})();

function animateVU() {
  for (let i = 0; i < 18; i++) {
    const b = document.getElementById('vu' + i);
    if (!b) continue;
    b.style.height  = (4 + Math.random() * 26) + 'px';
    b.style.opacity = 0.3 + Math.random() * 0.65;
  }
}

function stopVU() {
  clearInterval(vuTimer);
  for (let i = 0; i < 18; i++) {
    const b = document.getElementById('vu' + i);
    if (b) { b.style.height = '4px'; b.style.opacity = '0.2'; }
  }
}

function reelsPlay() {
  document.getElementById('reelL').className = 'reel spinning';
  document.getElementById('reelR').className = 'reel spinning-slow';
  document.getElementById('tapeSheen').classList.add('playing');
}
function reelsStop() {
  document.getElementById('reelL').className = 'reel';
  document.getElementById('reelR').className = 'reel';
  document.getElementById('tapeSheen').classList.remove('playing');
}

function loadTrack(url) {
  if (!url) return;

  if (audio) {
    audio.pause();
    clearInterval(syncTimer);
    stopVU();
    reelsStop();
    isPlaying = false;
    syncEpoch = null;
    document.getElementById('playBtn').classList.remove('ready');
  }

  audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.preload = 'auto';

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('duration').textContent =
      isFinite(audio.duration) ? fmt(audio.duration) : '—';
    try {
      const parts = url.split('/');
      const name  = decodeURIComponent(parts[parts.length - 1]).replace(/\.[^.]+$/, '');
      document.getElementById('trackTitle').textContent = name.slice(0, 22) || 'Track';
    } catch(e) { document.getElementById('trackTitle').textContent = 'Track'; }
    setStatus('ready · hit play when everyone is set');
  });

  audio.addEventListener('timeupdate', () => {
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    isPlaying = false;
    clearInterval(syncTimer);
    stopVU();
    reelsStop();
    document.getElementById('playIcon').style.display  = '';
    document.getElementById('pauseIcon').style.display = 'none';
    setStatus('track ended');
  });

  // Pre-fill epoch from shared link — do NOT auto-play
  const params = new URLSearchParams(window.location.search);
  const sharedEpoch = params.get('e') ? parseFloat(params.get('e')) : null;
  if (sharedEpoch) {
    syncEpoch = sharedEpoch;
    document.getElementById('playBtn').classList.add('ready');
    setStatus('synced · tap play when ready');
  }

  audio.src = url;
  audio.load();
  updateShareBox();
}

function togglePlay() {
  if (!audio) { showToast('load a track first'); return; }

  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    clearInterval(syncTimer);
    stopVU();
    reelsStop();
    document.getElementById('playIcon').style.display  = '';
    document.getElementById('pauseIcon').style.display = 'none';
    setStatus('paused');
    return;
  }

  // If joining from a shared link, seek to the correct position
  if (syncEpoch !== null) {
    const offset = getUTC() - syncEpoch;
    if (offset > 0 && offset < (audio.duration || 99999)) {
      audio.currentTime = offset;
    }
  }

  audio.play().then(() => {
    isPlaying = true;
    reelsPlay();
    document.getElementById('playIcon').style.display  = 'none';
    document.getElementById('pauseIcon').style.display = '';
    document.getElementById('playBtn').classList.remove('ready');
    syncEpoch = getUTC() - audio.currentTime;
    startSync();
    vuTimer = setInterval(animateVU, 80);
    setStatus('playing · in sync', true);
    updateShareBox();
  }).catch(() => {
    setStatus('tap play again — browser requires a gesture');
    showToast('tap play again');
  });
}

function startSync() {
  clearInterval(syncTimer);
  syncTimer = setInterval(() => {
    if (!isPlaying || !syncEpoch || !audio || !audio.duration) return;
    const drift = audio.currentTime - (getUTC() - syncEpoch);
    if (Math.abs(drift) > 1.5) {
      audio.currentTime = Math.min(Math.max(getUTC() - syncEpoch, 0), audio.duration);
    }
  }, 5000);
}

function updateShareBox() {
  const inp = document.getElementById('shareInput');
  if (syncEpoch === null) { inp.value = ''; return; }
  inp.value = window.location.href.split('?')[0] + '?e=' + Math.round(syncEpoch);
}

function copyLink() {
  const v = document.getElementById('shareInput').value;
  if (!v) { showToast('hit play first to generate a sync link'); return; }
  navigator.clipboard.writeText(v)
    .then(() => showToast('link copied!'))
    .catch(() => { document.getElementById('shareInput').select(); showToast('select and copy manually'); });
}

// Auto-load hardcoded track on page open — never auto-plays
const TRACK_URL = 'https://rossalli-cloud.github.io/paralleltangents/paralleltangents%20mixdown1.mp3';

(function() {
  loadTrack(TRACK_URL);
})();
</script>
</body>
</html>
